<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- black background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- outer circle -->
  <circle cx="16" cy="16" r="13" stroke="#ff6600" stroke-width="1.5"/>
  <!-- inner circle -->
  <circle cx="16" cy="16" r="5" stroke="#ff6600" stroke-width="1.5"/>
  <!-- crosshair lines -->
  <line x1="16" y1="3" x2="16" y2="10" stroke="#ff6600" stroke-width="1.5"/>
  <line x1="16" y1="22" x2="16" y2="29" stroke="#ff6600" stroke-width="1.5"/>
  <line x1="3" y1="16" x2="10" y2="16" stroke="#ff6600" stroke-width="1.5"/>
  <line x1="22" y1="16" x2="29" y2="16" stroke="#ff6600" stroke-width="1.5"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="2" fill="#ff6600"/>
</svg>
